name: Deploy

# ─────────────────────────────────────────────────────────────────────────────
# Triggered automatically after the CI workflow completes successfully on main.
# Deploy order: backend first (pushes image to GHCR + triggers Render),
# then frontend (deploys to Vercel). This ordering matters because the
# frontend calls the new GET /threads/{thread_id} endpoint added in this
# session — the backend must be live before the new frontend JS is served.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Cancel any in-progress deploy on the same branch when a new commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Guard — only proceed if CI passed
  # ───────────────────────────────────────────────────────────────────────────
  check-ci:
    name: CI passed?
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI green — proceeding with deploy
        run: echo "CI passed on ${{ github.event.workflow_run.head_sha }}"

  # ───────────────────────────────────────────────────────────────────────────
  # Backend — build Docker image, push to GHCR, trigger Render redeploy
  # ───────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → GHCR + Render
    runs-on: ubuntu-latest
    needs: check-ci

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract lowercase repo name for the image tag (GHCR requires lowercase)
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Render watches the GHCR image and redeploys when a new :latest is pushed.
      # The deploy hook URL is stored as a GitHub Secret.
      - name: Trigger Render redeploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL || vars.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL is not configured. Add it under GitHub Actions Secrets or Variables."
            exit 1
          fi
          case "$RENDER_DEPLOY_HOOK_URL" in
            https://*) ;;
            *)
              echo "::error::RENDER_DEPLOY_HOOK_URL must be a valid https:// Render deploy hook URL."
              exit 1
              ;;
          esac

          curl -fsSL --retry 3 --retry-all-errors \
            --request POST \
            --url "$RENDER_DEPLOY_HOOK_URL" \
            --header "Accept: application/json"

      - name: Wait for Render to come up
        # Poll the /health endpoint until the new build is live (max 5 min).
        env:
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL || vars.BACKEND_HEALTH_URL }}
        run: |
          if [ -z "${BACKEND_HEALTH_URL:-}" ]; then
            echo "::error::BACKEND_HEALTH_URL is not configured. Add it under GitHub Actions Secrets or Variables."
            exit 1
          fi
          case "$BACKEND_HEALTH_URL" in
            https://*) ;;
            *)
              echo "::error::BACKEND_HEALTH_URL must be a valid https:// backend origin."
              exit 1
              ;;
          esac

          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_HEALTH_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/30 — HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "Backend did not become healthy within 5 minutes."
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend — deploy to Vercel (production)
  # Runs after backend is confirmed healthy so the new JS is never served
  # against a stale backend.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Pull Vercel project config (.vercel/project.json) so the CLI knows
      # which project to deploy to without interactive prompts.
      - name: Pull Vercel environment
        working-directory: frontend
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}

      # Build with Vercel's own build system (respects vercel.json overrides).
      - name: Build for Vercel
        working-directory: frontend
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd .
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}

      # Deploy the pre-built output — no second build, fast deploy.
      - name: Deploy to Vercel (production)
        id: deploy
        working-directory: frontend
        run: |
          URL=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd .)
          echo "deployment_url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}

      - name: Print deployment URL
        working-directory: frontend
        run: echo "Deployed to ${{ steps.deploy.outputs.deployment_url }}"

  # ───────────────────────────────────────────────────────────────────────────
  # Smoke test — verify the deployed frontend responds and the live backend
  # remains healthy / CORS-accessible from that frontend origin.
  # ───────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Live Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Validate deployment URL output
        env:
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
        run: |
          test -n "$FRONTEND_URL"
          printf '%s' "$FRONTEND_URL" | grep -Eq '^https://'
          echo "Frontend deployment URL looks valid: $FRONTEND_URL"

      - name: Wait for frontend deployment to respond
        env:
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
        run: |
          echo "Waiting for frontend deployment at $FRONTEND_URL ..."
          for i in $(seq 1 18); do
            STATUS=$(curl -L -s -o /tmp/frontend-login.html -w "%{http_code}" "$FRONTEND_URL/login" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend responded with HTTP 200 after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/18 — HTTP $STATUS — waiting 10s..."
            sleep 10
          done
          echo "Frontend did not become reachable within 3 minutes."
          exit 1

      - name: Verify frontend login page content
        env:
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
        run: |
          curl -L -fsSL "$FRONTEND_URL/login" > /tmp/frontend-login.html
          grep -q "<title>" /tmp/frontend-login.html
          grep -q "SpokesBot" /tmp/frontend-login.html
          grep -q "AI Analytics Dashboard" /tmp/frontend-login.html
          echo "Frontend login page looks healthy."

      - name: Verify live backend health JSON
        env:
          BACKEND_URL: ${{ secrets.BACKEND_HEALTH_URL || vars.BACKEND_HEALTH_URL }}
        run: |
          BODY=$(curl -fsSL "$BACKEND_URL/health")
          echo "$BODY"
          BODY_MIN=$(printf '%s' "$BODY" | tr -d '[:space:]')
          printf '%s' "$BODY_MIN" | grep -q '"status":"ok"'
          echo "Backend health endpoint looks healthy."

      - name: Verify backend CORS allows deployed frontend origin
        env:
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
          BACKEND_URL: ${{ secrets.BACKEND_HEALTH_URL || vars.BACKEND_HEALTH_URL }}
        run: |
          curl -sS -D /tmp/backend-headers.txt -o /tmp/backend-health.json \
            -H "Origin: $FRONTEND_URL" \
            "$BACKEND_URL/health"
          cat /tmp/backend-headers.txt
          grep -i -q "access-control-allow-origin: $FRONTEND_URL" /tmp/backend-headers.txt
          grep -q '"status":"ok"' /tmp/backend-health.json
          echo "Backend CORS allows the deployed frontend origin."

      - name: Verify backend CORS preflight for frontend API requests
        env:
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.deployment_url }}
          BACKEND_URL: ${{ secrets.BACKEND_HEALTH_URL || vars.BACKEND_HEALTH_URL }}
        run: |
          curl -sS -X OPTIONS -D /tmp/backend-preflight-headers.txt -o /tmp/backend-preflight-body.txt \
            -H "Origin: $FRONTEND_URL" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: Authorization,Content-Type" \
            "$BACKEND_URL/health"
          cat /tmp/backend-preflight-headers.txt
          grep -i -q "access-control-allow-origin: $FRONTEND_URL" /tmp/backend-preflight-headers.txt
          grep -i -q "access-control-allow-credentials: true" /tmp/backend-preflight-headers.txt
          grep -i -q "access-control-allow-headers: .*Authorization.*Content-Type" /tmp/backend-preflight-headers.txt
          grep -i -q "access-control-allow-methods: .*GET" /tmp/backend-preflight-headers.txt
          echo "Backend CORS preflight looks healthy."
